services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - deployment/env/staging.env.example
    environment:
      APP_ENV: staging
      DXCON_DOCKER: "1"
    expose:
      - "8000"
    volumes:
      - staging_uploads:/var/lib/dxcon/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    stop_grace_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dxcon_staging
      POSTGRES_USER: dxcon
      POSTGRES_PASSWORD: dxcon
    volumes:
      - staging_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dxcon -d dxcon_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/live >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "production_start.py", "worker"]
    env_file:
      - deployment/env/staging.env.example
    environment:
      APP_ENV: staging
      DXCON_PROCESS_ROLE: worker
      DXCON_DOCKER: "1"
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "production_start.py", "scheduler"]
    env_file:
      - deployment/env/staging.env.example
    environment:
      APP_ENV: staging
      DXCON_PROCESS_ROLE: scheduler
      DXCON_DOCKER: "1"
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  staging_postgres:
  staging_uploads:
