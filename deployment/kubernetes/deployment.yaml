apiVersion: apps/v1
kind: Deployment
metadata:
  name: dxcon-api
  namespace: dxcon
  labels:
    app: dxcon-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dxcon-api
  template:
    metadata:
      labels:
        app: dxcon-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: api
          image: dxcon-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: dxcon-config
            - secretRef:
                name: dxcon-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
