apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dxcon-api
  namespace: dxcon
spec:
  podSelector:
    matchLabels:
      app: dxcon-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 443
