global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: dxcon-staging
    environment: staging

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: dxcon-api
    metrics_path: /api/v1/system/metrics
    static_configs:
      - targets:
          - api:8000
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: dxcon-api

  - job_name: dxcon-health
    metrics_path: /ready
    static_configs:
      - targets:
          - api:8000

  - job_name: nginx
    static_configs:
      - targets:
          - nginx:9113

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100
