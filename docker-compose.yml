services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://dxcon:dxcon@postgres:5432/dxcon
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: docker-dev-secret
      JWT_SECRET_KEY: docker-dev-jwt-secret
      DXCON_DOCKER: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    stop_grace_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dxcon
      POSTGRES_USER: dxcon
      POSTGRES_PASSWORD: dxcon
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dxcon -d dxcon"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
