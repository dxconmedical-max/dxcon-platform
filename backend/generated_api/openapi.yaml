components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: "X-API-Key"
      description: Partner API key issued by DxCon API Platform
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token placeholder
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          nullable: true
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
            field:
              type: string
            details:
              type: object
        request_id:
          type: string
        timestamp:
          type: string
          format: "date-time"
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        error:
          nullable: true
        request_id:
          type: string
        timestamp:
          type: string
          format: "date-time"
security:
  -
    ApiKeyAuth:
[]
  -
    BearerAuth:
[]
