services:
  - type: web
    name: dxcon-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py run:app
    healthCheckPath: /api/v1/system/health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_FORMAT
        value: json
      - key: STARTUP_VALIDATE_DB
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dxcon-postgres
          property: connectionString
      - key: BUILD_VERSION
        value: "2.5.0"

databases:
  - name: dxcon-postgres
    databaseName: dxcon
    user: dxcon_user
